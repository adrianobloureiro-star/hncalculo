<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Henrique Nunes Executivo - Orçamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1F497D; --dark: #0F1216; --accent: #FFFFFF; --whatsapp: #25D366; --text-gray: #A0AEC0; --card-bg: #1a1e24;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--accent); margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2d343d; }
    .titulo { text-align: center; font-size: 38px; margin-bottom: 10px; font-weight: 900; text-decoration: underline; text-transform: uppercase; }
    .titulo span { color: var(--primary); }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo img { max-width: 240px; width: 100%; height: auto; }
    h2 { text-align: center; margin: 10px 0 25px 0; font-weight: 400; font-size: 1.2rem; color: var(--text-gray); }
    .linha { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
    input { flex: 1; min-width: 260px; padding: 15px; font-size: 16px; border: 1px solid #2d343d; border-radius: 8px; background: #090b0d; color: #fff; }
    .botoes { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; margin-top: 15px; }
    .botoes button { flex: 0 1 220px; padding: 15px; font-size: 14px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
    .btn-azul { background: var(--primary); }
    .btn-verde { background: #2d343d; border: 1px solid #444; }
    .btn-wpp { background: var(--whatsapp); }
    #resultado { margin-top: 25px; padding: 20px; background: #090b0d; border-radius: 12px; border: 1px solid var(--primary); line-height: 1.8; }
    #map { margin-top: 20px; height: 450px; border-radius: 12px; border: 1px solid #2d343d; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; padding: 16px; z-index: 2000; }
    .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; padding: 25px; border: 1px solid var(--primary); }
    footer { margin-top: 30px; text-align: center; font-size: 13px; color: var(--text-gray); }
    @media (max-width: 600px) { .titulo { font-size: 28px; } .botoes button { flex: 1 1 100%; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="titulo">Henrique Nunes <span>Executivo</span></div>
    <div class="logo">
        <img src="../Henrique nunes/logotipo-hn.png" alt="Henrique Nunes" />
    </div>
    <h2>Simulador de Rota e Orçamento Premium</h2>

    <div class="linha">
      <input id="origem" placeholder="Local de embarque" />
      <input id="destino" placeholder="Local de destino" />
    </div>

    <div class="botoes">
      <button class="btn-verde" id="btnLocalizacao">📍 Usar GPS</button>
      <button class="btn-verde" id="btnInverter">🔁 Inverter</button>
      <button class="btn-wpp" id="btnWhats">💬 WhatsApp</button>
    </div>

    <div class="botoes" style="margin-top:25px;">
      <button class="btn-azul" id="btnCalcular" style="max-width:400px; flex:1; font-size:18px;">Gerar Orçamento</button>
    </div>

    <div id="resultado">Preencha os dados e clique em Gerar Orçamento.</div>
    <div id="map"></div>

    <footer>Desenvolvido por <b>Braztec</b> | Contato: <b>27 99836-1919</b></footer>
  </div>

  <div class="modal" id="modalNome">
    <div class="modal-content">
      <h3>Confirme seu Nome</h3>
      <input type="text" id="nomeCliente" placeholder="Seu nome" style="width:100%; box-sizing:border-box; padding:12px; border-radius:8px; background:#090b0d; color:#fff; border:1px solid #2d343d;" />
      <div class="botoes" style="margin-top:20px;">
        <button class="btn-verde" id="btnCancelar" style="background:#344054">Voltar</button>
        <button class="btn-azul" id="btnEnviar">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    let map, directionsService, directionsRenderer, geocoder;
    
    // Configurações de Preço
    let TARIFA_BASE = 180.00;
    let VALOR_POR_KM = 5.00;
    const ADICIONAL_NOTURNO = 50.00;
    const WHATSAPP_NUMERO = "5527988342615";

    let ultimoResumo = null, ultimoSnapshot = null;
    let acOrigem = null, acDestino = null, acOrigemIniciado = false, acDestinoIniciado = false;

    function brl(v) { return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }); }
    function setResultado(html) { document.getElementById("resultado").innerHTML = html; }
    
    function emHorarioNoturno() {
      const h = new Date().getHours();
      return (h >= 22 || h < 6);
    }

    function initAutocomplete() {
      const opts = { types: ["geocode"], componentRestrictions: { country: "br" } };
      const oInput = document.getElementById("origem");
      const dInput = document.getElementById("destino");

      oInput.addEventListener("input", () => {
        if (!acOrigemIniciado && oInput.value.length >= 3) {
          acOrigem = new google.maps.places.Autocomplete(oInput, opts);
          acOrigemIniciado = true;
        }
      });

      dInput.addEventListener("input", () => {
        if (!acDestinoIniciado && dInput.value.length >= 3) {
          acDestino = new google.maps.places.Autocomplete(dInput, opts);
          acDestinoIniciado = true;
        }
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -20.3155, lng: -40.3128 },
        zoom: 12,
        styles: [{ "stylers": [{ "hue": "#1F497D" }, { "saturation": -20 }] }]
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map });
      geocoder = new google.maps.Geocoder();
      initAutocomplete();

      document.getElementById("btnLocalizacao").addEventListener("click", usarMinhaLocalizacao);
      document.getElementById("btnInverter").addEventListener("click", () => {
        const o = document.getElementById("origem"), d = document.getElementById("destino");
        [o.value, d.value] = [d.value, o.value];
        ultimoResumo = null;
      });

      document.getElementById("btnCalcular").addEventListener("click", () => calcularRota());
      
      document.getElementById("btnWhats").addEventListener("click", () => {
        const o = document.getElementById("origem").value, d = document.getElementById("destino").value;
        if (!ultimoResumo || o !== ultimoSnapshot?.o || d !== ultimoSnapshot?.d) {
          calcularRota(true);
        } else {
          abrirModal();
        }
      });

      document.getElementById("btnCancelar").addEventListener("click", () => document.getElementById("modalNome").style.display="none");
      document.getElementById("btnEnviar").addEventListener("click", enviarWhats);
    }

    function usarMinhaLocalizacao() {
      if (!navigator.geolocation) return alert("GPS não suportado.");
      navigator.geolocation.getCurrentPosition(pos => {
        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        geocoder.geocode({ location: latlng }, (results, status) => {
          if (status === "OK") document.getElementById("origem").value = results[0].formatted_address;
        });
      });
    }

    function calcularRota(abrirModalDepois = false) {
      const o = document.getElementById("origem").value, d = document.getElementById("destino").value;
      if (!o || !d) return alert("Por favor, preencha origem e destino.");

      directionsService.route({
        origin: o,
        destination: d,
        travelMode: 'DRIVING'
      }, (res, status) => {
        if (status === "OK") {
          directionsRenderer.setDirections(res);
          const rota = res.routes[0].legs[0];
          const km = rota.distance.value / 1000;
          const adicional = emHorarioNoturno() ? ADICIONAL_NOTURNO : 0;
          const total = TARIFA_BASE + (km * VALOR_POR_KM) + adicional;

          ultimoResumo = {
            origem: rota.start_address,
            destino: rota.end_address,
            distancia: rota.distance.text,
            preco: brl(total)
          };
          ultimoSnapshot = { o, d };

          setResultado(`<b>Distância:</b> ${rota.distance.text} | <b>Valor Estimado:</b> ${brl(total)}`);
          if (abrirModalDepois) abrirModal();
        } else {
          alert("Não foi possível calcular a rota.");
        }
      });
    }

    function abrirModal() { document.getElementById("modalNome").style.display="flex"; }

    function enviarWhats() {
      const nome = document.getElementById("nomeCliente").value;
      if (!nome) return alert("Digite seu nome.");
      let msg = `Olá, me chamo ${nome}.\nOrçamento Executivo:\nDe: ${ultimoResumo.origem}\nPara: ${ultimoResumo.destino}\nDistância: ${ultimoResumo.distancia}\nValor: ${ultimoResumo.preco}`;
      window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`, "_blank");
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCCCNAa-Zu-wK5Bov5P1rNYgubIhrICYaM&libraries=places&callback=initMap"></script>
</body>
</html>
